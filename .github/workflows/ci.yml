name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest

  minimal:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal package (numpy only)
        run: pip install -e .

      - name: Smoke test minimal install
        run: |
          python - <<'PY'
          import numpy as np
          from vardiag import diagnose

          X = np.random.randn(100, 200).astype("float32")
          y = np.array([0] * 50 + [1] * 50)

          result = diagnose(X, y, k_pct=10)
          assert result.zone in {"GREEN_SAFE", "RED_HARMFUL", "YELLOW_INCONCLUSIVE"}
          assert result.elapsed_s >= 0.0
          print("Minimal install OK:", result.zone)
          PY

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distributions
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Install built wheel and verify
        run: |
          pip install dist/*.whl
          python - <<'PY'
          import vardiag
          print("Installed wheel version:", vardiag.__version__)
          assert vardiag.__version__ != "unknown", "Version not set correctly"
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
