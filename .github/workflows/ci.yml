name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install with dev extras
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest vardiag/tests/ -v --tb=short

  test-minimal:
    # Verify the package works with numpy-only (no scipy/sklearn)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal (numpy only)
        run: pip install -e "."
      - name: Run core metrics tests only
        run: |
          python -c "
          import numpy as np
          from vardiag import diagnose
          X = np.random.randn(100, 200).astype('float32')
          y = np.array([0]*50 + [1]*50)
          r = diagnose(X, y, k_pct=10)
          assert r.zone in ('GREEN_SAFE', 'RED_HARMFUL', 'YELLOW_INCONCLUSIVE')
          print('Minimal install OK:', r.zone)
          "

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distribution
        run: |
          pip install build
          python -m build
      - name: Check dist
        run: |
          pip install twine
          twine check dist/*
