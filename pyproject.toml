abstract: >
  vardiag computes the Variance Alignment Diagnostic (VAD), a lightweight,
  model-free, label-aware framework that identifies whether variance-based
  feature filtering is safe or harmful for a labelled high-dimensional dataset
  before any model is trained. Core outputs include the signal enrichment ratio
  (η_ES), Variance-Signal Alignment (VSA), and a GREEN / RED / YELLOW risk zone
  classification. Computation completes in under one second per view.

